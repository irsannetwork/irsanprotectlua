<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR-Lua Protect | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a; --card: #111418; --primary: #3b82f6;
            --accent: #10b981; --text: #e2e8f0; --border: #1f2937;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #loading-screen, #verify-screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
        }
        .loader { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--card); }
        
        #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 265px; background: var(--card); border-right: 1px solid var(--border); transition: 0.4s; z-index: 1000; padding-top: 20px; }
        #sidebar.active { left: 0; }
        .side-logo { padding: 20px; font-weight: 800; font-size: 1.2rem; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .side-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; color: inherit; text-decoration: none; }
        .side-item:hover { background: #1a1f26; color: var(--accent); }

        .content { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .content.active { display: block; }
        .tool-card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; margin-bottom: 20px; }
        
        textarea { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 10px; color: var(--accent); padding: 12px; font-family: monospace; box-sizing: border-box; outline: none; margin-bottom: 10px;}
        .btn { background: linear-gradient(135deg, #047857, var(--accent)); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; display: block; text-align: center; text-decoration: none; }
        
        /* Komentar Style */
        .comment-box { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 15px; }
        .comment-input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; resize: none; }
        .comment-list { max-height: 250px; overflow-y: auto; margin-top: 15px; }
        .comment-item { background: #1a1f26; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
        .comment-user { color: var(--accent); font-weight: bold; margin-bottom: 4px; display: block; }
        .comment-time { font-size: 0.7rem; opacity: 0.5; display: block; margin-top: 5px; }
        .like-section { display: flex; align-items: center; gap: 6px; margin-top: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; width: fit-content; }
        .like-section.voted { color: #555 !important; cursor: default; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader"></div><p style="margin-top:20px; color:var(--accent)">IR-LUA LOADING...</p></div>
    
    <div id="verify-screen" style="display:none;">
        <div style="text-align:center;">
            <i class="fas fa-shield-halved" style="font-size:4rem; color:var(--accent); margin-bottom:20px"></i>
            <h3>SECURITY VERIFICATION</h3>
            <button class="btn" style="width:200px; margin: 0 auto;" onclick="completeVerify()">SAYA BUKAN ROBOT</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <i class="fas fa-bars-staggered" style="font-size:1.5rem; cursor:pointer" onclick="toggleSidebar()"></i>
            <div style="font-weight:900;">IR-LUA <span style="color:var(--accent)">PROTECT</span></div>
            <i class="fas fa-lock" style="color:var(--accent)"></i>
        </header>

        <nav id="sidebar">
            <div class="side-logo">RC TEAM PANEL</div>
            <div class="side-item" onclick="showPage('home')"><i class="fas fa-house"></i> Dashboard</div>
            <div class="side-item" onclick="showPage('obfuscator')"><i class="fas fa-file-shield"></i> Obfuscator IR-Lua</div>
            <a href="https://wa.me/6289531633581" target="_blank" class="side-item"><i class="fab fa-whatsapp" style="color: #25D366;"></i> WhatsApp Irsan</a>
        </nav>
        <div class="overlay" onclick="toggleSidebar()"></div>

        <div id="home" class="content active">
            <div class="tool-card">
                <h2 style="margin:0; color:var(--accent)">Welcome, pengguna!</h2>
                <p>pakai tools ini agar kode kamu tidak dicuri orang yang tidak bertanggung jawab</p>
            </div>

            <div class="tool-card">
                <h3><i class="fas fa-comments"></i> Kolom Komentar</h3>
                <div class="comment-box">
                    <textarea id="userComment" class="comment-input" style="height: 80px;" placeholder="Tulis komentar kamu di sini..."></textarea>
                    <button class="btn" onclick="addComment()">Kirim Komentar</button>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>

        <div id="obfuscator" class="content">
            <h3>Mulai Encrypt</h3>
            <div class="tool-card">
                <input type="file" id="fileIn" style="display:none" onchange="handleFile(event)">
                <button class="btn" style="background:#1f2937; margin-bottom:10px" onclick="document.getElementById('fileIn').click()">📁 UPLOAD .LUA FILE</button>
                <textarea id="obsInput" style="height:180px" placeholder="Paste source code here..."></textarea>
                
                <select id="obsLevel" style="width:100%; padding:12px; background:#000; color:white; border:1px solid var(--border); border-radius:10px; margin-bottom:15px">
                    <option value="1">V1: IR-Lua1</option>
                    <option value="2">V2: IR-Lua2</option>
                    <option value="3">V3: IR-Lua3</option>
                </select>
                
                <button class="btn" onclick="runObfuscate()">OBFUSCATE!</button>
                <textarea id="obsOutput" style="height:120px; margin-top:15px" readonly placeholder="hasil disini brok"></textarea>
                <button class="btn" style="background:#1f2937; margin-top:10px" onclick="downloadFile('obsOutput', 'obfuscare_irsan.lua')">DOWNLOAD .LUA</button>
            </div>
        </div>
    </div>

    <script>
        // System UI
        setTimeout(() => { document.getElementById('loading-screen').style.display='none'; document.getElementById('verify-screen').style.display='flex'; }, 1500);
        function completeVerify() { document.getElementById('verify-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; loadComments(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.overlay').classList.toggle('active'); }
        function showPage(id) { document.querySelectorAll('.content').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); if(window.innerWidth<768) toggleSidebar(); }

        // Obfuscator Logic
        function runObfuscate() {
            let code = document.getElementById('obsInput').value; 
            let lv = document.getElementById('obsLevel').value;
            if(!code) return alert("Input Source!"); 
            let result = ""; 
            let header = `-- IR-LUA PROTECT --IR PROTECT V1 JOIN WHATSAPP COMMUNITY ( V${lv} )\n`;
            
            if(lv == "1") { for(let i=0; i<code.length; i++) result += String.fromCharCode(code.charCodeAt(i) + 7); } 
            else if(lv == "2") { let rev = code.split("").reverse().join(""); for(let i=0; i<rev.length; i++) result += String.fromCharCode(rev.charCodeAt(i) + 12); } 
            else { for(let i=0; i<code.length; i++) result += String.fromCharCode(code.charCodeAt(i) + 33); }
            document.getElementById('obsOutput').value = `${header}local _IR = "${btoa(result)}"\nreturn _IR`;
        }

        // Automatic Name Detection
        function getBrowserUser() {
            const ua = navigator.userAgent;
            if (ua.includes("Chrome")) return "Chrome User";
            if (ua.includes("Firefox")) return "Firefox User";
            if (ua.includes("Safari") && !ua.includes("Chrome")) return "Apple User";
            return "Mobile User";
        }

        // Comment System with Anti-Spam Like
        function addComment() {
            const text = document.getElementById('userComment').value;
            if(!text) return alert("Komentar tidak boleh kosong!");

            const commentObj = {
                id: Date.now(),
                name: getBrowserUser(),
                text: text,
                time: new Date().toLocaleString(),
                likes: 0
            };

            let comments = JSON.parse(localStorage.getItem('ir_comments') || '[]');
            comments.unshift(commentObj);
            localStorage.setItem('ir_comments', JSON.stringify(comments));

            document.getElementById('userComment').value = '';
            loadComments();
        }

        function loadComments() {
            const list = document.getElementById('commentList');
            let comments = JSON.parse(localStorage.getItem('ir_comments') || '[]');
            let likedIds = JSON.parse(localStorage.getItem('ir_liked_ids') || '[]');

            list.innerHTML = comments.map((c) => {
                const isLiked = likedIds.includes(c.id);
                return `
                    <div class="comment-item">
                        <span class="comment-user"><i class="fas fa-user-circle"></i> ${c.name}</span>
                        <div style="color:white;">${c.text}</div>
                        <span class="comment-time">${c.time}</span>
                        <div class="like-section ${isLiked ? 'voted' : ''}" onclick="likeComment(${c.id})">
                            <i class="fas fa-thumbs-up" style="color: ${isLiked ? '#555' : 'var(--accent)'}"></i> 
                            <span>${c.likes} Suka</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function likeComment(id) {
            let likedIds = JSON.parse(localStorage.getItem('ir_liked_ids') || '[]');
            if(likedIds.includes(id)) return; // Blokir jika sudah like

            let comments = JSON.parse(localStorage.getItem('ir_comments') || '[]');
            const idx = comments.findIndex(c => c.id === id);
            
            if(idx !== -1) {
                comments[idx].likes += 1;
                likedIds.push(id);
                localStorage.setItem('ir_comments', JSON.stringify(comments));
                localStorage.setItem('ir_liked_ids', JSON.stringify(likedIds));
                loadComments();
            }
        }

        function handleFile(e) {
            let fr = new FileReader();
            fr.onload = (el) => document.getElementById('obsInput').value = el.target.result;
            fr.readAsText(e.target.files[0]);
        }
        function downloadFile(id, name) {
            let t = document.getElementById(id).value; if(!t) return;
            let b = new Blob([t], {type:"text/plain"});
            let a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = name; a.click();
        }
    </script>
</body>
</html>
